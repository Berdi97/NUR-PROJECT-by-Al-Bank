<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>QuickBite POS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --surface2: #242220;
    --border: #2e2c28;
    --accent: #f5a623;
    --accent2: #e8441a;
    --green: #2eb872;
    --text: #f0ede6;
    --muted: #7a7568;
    --card-radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); }

  /* LAYOUT */
  #app { display: grid; grid-template-columns: 1fr 340px; grid-template-rows: 64px 1fr; height: 100vh; }

  /* HEADER */
  header {
    grid-column: 1 / -1;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 10;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--accent); }
  .logo span { color: var(--accent2); }
  .header-info { display: flex; align-items: center; gap: 20px; }
  .staff-badge {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 30px; padding: 6px 14px; font-size: 13px; font-weight: 600;
  }
  .staff-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
  .time-display { font-size: 13px; color: var(--muted); font-weight: 500; }

  /* MENU PANEL */
  #menu-panel { overflow-y: auto; padding: 16px; background: var(--bg); }
  #menu-panel::-webkit-scrollbar { width: 4px; }
  #menu-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* CATEGORY TABS */
  .cat-tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat-tab {
    flex-shrink: 0;
    padding: 8px 18px; border-radius: 30px; border: 1.5px solid var(--border);
    background: var(--surface); font-size: 13px; font-weight: 600;
    color: var(--muted); cursor: pointer; transition: all .18s;
  }
  .cat-tab.active { background: var(--accent); border-color: var(--accent); color: #000; }

  /* MENU GRID */
  .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .menu-item {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--card-radius);
    padding: 14px 12px; cursor: pointer; transition: all .15s; position: relative; overflow: hidden;
    display: flex; flex-direction: column; gap: 6px;
  }
  .menu-item:active { transform: scale(0.96); }
  .menu-item:hover { border-color: var(--accent); background: var(--surface2); }
  .menu-item-emoji { font-size: 32px; line-height: 1; margin-bottom: 4px; }
  .menu-item-name { font-size: 13px; font-weight: 700; line-height: 1.2; }
  .menu-item-price { font-size: 15px; font-weight: 700; color: var(--accent); }
  .menu-item-badge {
    position: absolute; top: 8px; right: 8px;
    background: var(--accent2); color: #fff; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 30px;
  }
  .add-flash {
    animation: flash .3s ease;
  }
  @keyframes flash {
    0% { background: var(--surface); }
    50% { background: #2e2600; border-color: var(--accent); }
    100% { background: var(--surface); }
  }

  /* ORDER PANEL */
  #order-panel {
    display: flex; flex-direction: column;
    background: var(--surface); border-left: 1px solid var(--border);
    overflow: hidden;
  }
  .order-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .order-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; color: var(--text); }
  .order-num { font-size: 12px; color: var(--muted); font-weight: 600; }

  /* ORDER TYPE TOGGLE */
  .order-type-toggle {
    display: flex; margin: 10px 16px; border-radius: 10px; overflow: hidden;
    border: 1.5px solid var(--border); background: var(--bg);
  }
  .order-type-btn {
    flex: 1; padding: 8px 0; font-size: 12px; font-weight: 700; text-align: center;
    cursor: pointer; color: var(--muted); transition: all .15s; border: none; background: transparent;
  }
  .order-type-btn.active { background: var(--accent2); color: #fff; }

  /* TABLE NUMBER */
  .table-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 16px 10px; border-bottom: 1px solid var(--border);
  }
  .table-label { font-size: 12px; font-weight: 600; color: var(--muted); white-space: nowrap; }
  .table-input {
    background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 600;
    padding: 5px 10px; width: 70px; text-align: center;
  }
  .table-input:focus { outline: none; border-color: var(--accent); }

  /* ORDER ITEMS */
  #order-items { flex: 1; overflow-y: auto; padding: 8px 16px; }
  #order-items::-webkit-scrollbar { width: 3px; }
  #order-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .empty-order { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; }
  .empty-order-icon { font-size: 48px; opacity: .3; }
  .empty-order-text { font-size: 13px; color: var(--muted); font-weight: 500; }

  .order-line {
    display: flex; align-items: center; gap: 10px; padding: 10px 0;
    border-bottom: 1px solid var(--border);
    animation: slideIn .2s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
  .order-line-emoji { font-size: 20px; }
  .order-line-info { flex: 1; min-width: 0; }
  .order-line-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .order-line-unit { font-size: 11px; color: var(--muted); }
  .qty-ctrl { display: flex; align-items: center; gap: 6px; }
  .qty-btn {
    width: 26px; height: 26px; border-radius: 8px; border: 1.5px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-weight: 700;
    transition: all .12s; line-height: 1;
  }
  .qty-btn:active { transform: scale(0.88); }
  .qty-btn.minus:hover { border-color: var(--accent2); color: var(--accent2); }
  .qty-btn.plus:hover { border-color: var(--green); color: var(--green); }
  .qty-num { font-size: 14px; font-weight: 700; min-width: 18px; text-align: center; }
  .order-line-total { font-size: 13px; font-weight: 700; color: var(--accent); min-width: 44px; text-align: right; }

  /* NOTE INPUT */
  .note-area { padding: 0 16px 8px; }
  .note-input {
    width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px;
    color: var(--muted); font-size: 12px; font-family: 'DM Sans', sans-serif;
    padding: 8px 12px; resize: none; height: 52px;
  }
  .note-input:focus { outline: none; border-color: var(--accent); color: var(--text); }
  .note-input::placeholder { color: var(--muted); }

  /* TOTALS */
  .totals { padding: 10px 16px; border-top: 1px solid var(--border); }
  .totals-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-bottom: 5px; }
  .totals-row.grand { font-size: 20px; font-weight: 700; color: var(--text); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .totals-row.grand span:last-child { color: var(--accent); }

  /* PAYMENT */
  .payment-row { display: flex; gap: 8px; padding: 8px 16px 4px; }
  .pay-btn {
    flex: 1; padding: 10px 6px; border-radius: 10px; border: 1.5px solid var(--border);
    background: var(--bg); color: var(--muted); font-size: 12px; font-weight: 700; cursor: pointer;
    transition: all .15s;
  }
  .pay-btn.active { background: var(--surface2); border-color: var(--accent); color: var(--accent); }

  /* SUBMIT */
  .submit-btn {
    margin: 8px 16px 16px; padding: 16px; border-radius: 12px; border: none;
    background: var(--accent); color: #000; font-size: 16px; font-weight: 800;
    font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; cursor: pointer;
    transition: all .15s; width: calc(100% - 32px);
  }
  .submit-btn:hover { background: #f7b94a; }
  .submit-btn:active { transform: scale(0.97); }
  .submit-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  /* SUCCESS TOAST */
  .toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-10px);
    background: var(--green); color: #fff; padding: 12px 24px; border-radius: 30px;
    font-size: 14px; font-weight: 700; opacity: 0; pointer-events: none;
    transition: all .3s; z-index: 100; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 28px; width: 380px; max-width: 90vw;
    transform: scale(0.95); transition: transform .2s;
  }
  .modal-overlay.show .modal { transform: scale(1); }
  .modal h2 { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 1px; margin-bottom: 6px; }
  .modal p { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
  .modal-input-row { margin-bottom: 14px; }
  .modal-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 5px; display: block; }
  .modal-input {
    width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif;
    padding: 10px 14px;
  }
  .modal-input:focus { outline: none; border-color: var(--accent); }
  .modal-btn {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    background: var(--accent); color: #000; font-size: 15px; font-weight: 800;
    font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; cursor: pointer;
    transition: background .15s;
  }
  .modal-btn:hover { background: #f7b94a; }

  /* LOADING SPINNER */
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,.3); border-top-color: #000; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SECTION LABEL */
  .section-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; margin-top: 4px; }

  /* CLEAR BTN */
  .clear-btn { font-size: 11px; font-weight: 700; color: var(--muted); background: none; border: none; cursor: pointer; padding: 0; }
  .clear-btn:hover { color: var(--accent2); }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo">Quick<span>Bite</span> <span style="color:var(--muted);font-size:14px;letter-spacing:1px;font-family:'DM Sans',sans-serif;font-weight:600">POS</span></div>
    <div class="header-info">
      <div class="time-display" id="clock"></div>
      <div class="staff-badge"><div class="staff-dot"></div><span id="staff-name">Staff</span></div>
    </div>
  </header>

  <!-- MENU PANEL -->
  <div id="menu-panel">
    <div class="cat-tabs" id="cat-tabs"></div>
    <div class="section-label" id="cat-heading">All Items</div>
    <div class="menu-grid" id="menu-grid"></div>
  </div>

  <!-- ORDER PANEL -->
  <div id="order-panel">
    <div class="order-header">
      <div>
        <div class="order-title">Current Order</div>
        <div class="order-num" id="order-num">#0001</div>
      </div>
      <button class="clear-btn" onclick="clearOrder()">Clear all</button>
    </div>

    <div class="order-type-toggle">
      <button class="order-type-btn active" id="btn-dinein" onclick="setOrderType('dine-in')">🪑 Dine In</button>
      <button class="order-type-btn" id="btn-takeaway" onclick="setOrderType('takeaway')">🥡 Takeaway</button>
      <button class="order-type-btn" id="btn-delivery" onclick="setOrderType('delivery')">🛵 Delivery</button>
    </div>

    <div class="table-row" id="table-row">
      <span class="table-label">Table #</span>
      <input class="table-input" id="table-num" type="number" min="1" max="99" placeholder="—">
      <span class="table-label" style="margin-left:auto">Covers</span>
      <input class="table-input" id="covers" type="number" min="1" max="20" placeholder="—" style="width:55px">
    </div>

    <div id="order-items">
      <div class="empty-order">
        <div class="empty-order-icon">🛒</div>
        <div class="empty-order-text">Tap items to add them</div>
      </div>
    </div>

    <textarea class="note-input note-area" id="order-note" placeholder="Order notes (allergies, special requests…)"></textarea>

    <div class="totals">
      <div class="totals-row"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
      <div class="totals-row"><span>Tax (8%)</span><span id="tax">$0.00</span></div>
      <div class="totals-row grand"><span>TOTAL</span><span id="grand-total">$0.00</span></div>
    </div>

    <div class="payment-row">
      <button class="pay-btn active" id="pay-cash" onclick="setPayment('Cash')">💵 Cash</button>
      <button class="pay-btn" id="pay-card" onclick="setPayment('Card')">💳 Card</button>
      <button class="pay-btn" id="pay-mobile" onclick="setPayment('Mobile')">📱 Mobile</button>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitOrder()" disabled>SEND ORDER</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- SETUP MODAL -->
<div class="modal-overlay show" id="setup-modal">
  <div class="modal">
    <h2>🔧 Setup POS</h2>
    <p>Enter your Google Apps Script Web App URL and staff name to get started. Orders will be saved directly to your Google Sheet.</p>
    <div class="modal-input-row">
      <label class="modal-label">Google Apps Script URL</label>
      <input class="modal-input" id="script-url-input" type="url" placeholder="https://script.google.com/macros/s/…/exec">
    </div>
    <div class="modal-input-row">
      <label class="modal-label">Staff Name</label>
      <input class="modal-input" id="staff-input" type="text" placeholder="e.g. Maria">
    </div>
    <button class="modal-btn" onclick="saveSetup()">START TAKING ORDERS →</button>
  </div>
</div>

<script>
// =============================================
// MENU DATA — Edit this to match your menu!
// =============================================
const MENU = [
  // Burgers
  { id: 'b1', name: 'Classic Burger',   cat: 'Burgers',  price: 8.99,  emoji: '🍔', badge: null },
  { id: 'b2', name: 'Double Stack',     cat: 'Burgers',  price: 11.49, emoji: '🍔', badge: '🔥HOT' },
  { id: 'b3', name: 'Cheese Melt',      cat: 'Burgers',  price: 9.99,  emoji: '🧀', badge: null },
  { id: 'b4', name: 'BBQ Smokey',       cat: 'Burgers',  price: 10.49, emoji: '🍖', badge: null },
  { id: 'b5', name: 'Veggie Patty',     cat: 'Burgers',  price: 9.49,  emoji: '🥗', badge: '🌱VEG' },
  { id: 'b6', name: 'Crispy Chicken',   cat: 'Burgers',  price: 9.99,  emoji: '🍗', badge: null },
  // Sides
  { id: 's1', name: 'Fries (S)',        cat: 'Sides',    price: 2.99,  emoji: '🍟', badge: null },
  { id: 's2', name: 'Fries (L)',        cat: 'Sides',    price: 3.99,  emoji: '🍟', badge: null },
  { id: 's3', name: 'Onion Rings',      cat: 'Sides',    price: 4.49,  emoji: '🧅', badge: null },
  { id: 's4', name: 'Coleslaw',         cat: 'Sides',    price: 2.49,  emoji: '🥗', badge: null },
  { id: 's5', name: 'Loaded Fries',     cat: 'Sides',    price: 5.99,  emoji: '🍟', badge: '🔥HOT' },
  { id: 's6', name: 'Side Salad',       cat: 'Sides',    price: 3.49,  emoji: '🥬', badge: '🌱VEG' },
  // Drinks
  { id: 'd1', name: 'Cola',             cat: 'Drinks',   price: 1.99,  emoji: '🥤', badge: null },
  { id: 'd2', name: 'Lemonade',         cat: 'Drinks',   price: 2.49,  emoji: '🍋', badge: null },
  { id: 'd3', name: 'Orange Juice',     cat: 'Drinks',   price: 2.99,  emoji: '🍊', badge: null },
  { id: 'd4', name: 'Milkshake',        cat: 'Drinks',   price: 4.99,  emoji: '🥛', badge: null },
  { id: 'd5', name: 'Water',            cat: 'Drinks',   price: 0.99,  emoji: '💧', badge: null },
  { id: 'd6', name: 'Iced Tea',         cat: 'Drinks',   price: 2.29,  emoji: '🧊', badge: null },
  // Desserts
  { id: 'ds1', name: 'Soft Serve',      cat: 'Desserts', price: 2.99,  emoji: '🍦', badge: null },
  { id: 'ds2', name: 'Brownie',         cat: 'Desserts', price: 3.49,  emoji: '🍫', badge: null },
  { id: 'ds3', name: 'Apple Pie Slice', cat: 'Desserts', price: 3.99,  emoji: '🥧', badge: null },
];

const TAX_RATE = 0.08;

// =============================================
// STATE
// =============================================
let cart = [];
let orderType = 'dine-in';
let paymentMethod = 'Cash';
let orderCounter = 1;
let activeCategory = 'All';
let scriptUrl = '';
let staffName = 'Staff';

// =============================================
// INIT
// =============================================
window.onload = () => {
  scriptUrl = localStorage.getItem('qb_script_url') || '';
  staffName = localStorage.getItem('qb_staff') || '';
  if (scriptUrl && staffName) {
    document.getElementById('staff-name').textContent = staffName;
    document.getElementById('setup-modal').classList.remove('show');
  }
  loadOrderCounter();
  buildCategories();
  renderMenu();
  updateClock();
  setInterval(updateClock, 1000);
};

function saveSetup() {
  const url = document.getElementById('script-url-input').value.trim();
  const name = document.getElementById('staff-input').value.trim();
  if (!url || !name) { alert('Please fill in both fields.'); return; }
  scriptUrl = url;
  staffName = name;
  localStorage.setItem('qb_script_url', url);
  localStorage.setItem('qb_staff', name);
  document.getElementById('staff-name').textContent = name;
  document.getElementById('setup-modal').classList.remove('show');
}

function loadOrderCounter() {
  const saved = parseInt(localStorage.getItem('qb_order_counter') || '1');
  orderCounter = saved;
  document.getElementById('order-num').textContent = '#' + String(orderCounter).padStart(4, '0');
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}

// =============================================
// MENU RENDERING
// =============================================
const CATEGORIES = ['All', ...new Set(MENU.map(i => i.cat))];

function buildCategories() {
  const tabs = document.getElementById('cat-tabs');
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab' + (cat === 'All' ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { activeCategory = cat; updateCatTabs(); renderMenu(); };
    tabs.appendChild(btn);
  });
}

function updateCatTabs() {
  document.querySelectorAll('.cat-tab').forEach((btn, i) => {
    btn.classList.toggle('active', CATEGORIES[i] === activeCategory);
  });
  document.getElementById('cat-heading').textContent = activeCategory === 'All' ? 'All Items' : activeCategory;
}

function renderMenu() {
  const grid = document.getElementById('menu-grid');
  grid.innerHTML = '';
  const items = activeCategory === 'All' ? MENU : MENU.filter(i => i.cat === activeCategory);
  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'menu-item';
    div.id = 'mi-' + item.id;
    div.innerHTML = `
      ${item.badge ? `<div class="menu-item-badge">${item.badge}</div>` : ''}
      <div class="menu-item-emoji">${item.emoji}</div>
      <div class="menu-item-name">${item.name}</div>
      <div class="menu-item-price">$${item.price.toFixed(2)}</div>`;
    div.onclick = () => addToCart(item, div);
    grid.appendChild(div);
  });
}

// =============================================
// CART LOGIC
// =============================================
function addToCart(item, el) {
  el.classList.remove('add-flash');
  void el.offsetWidth;
  el.classList.add('add-flash');
  const existing = cart.find(c => c.id === item.id);
  if (existing) { existing.qty++; }
  else { cart.push({ ...item, qty: 1 }); }
  renderCart();
}

function changeQty(id, delta) {
  const idx = cart.findIndex(c => c.id === id);
  if (idx === -1) return;
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  renderCart();
}

function clearOrder() {
  cart = [];
  document.getElementById('order-note').value = '';
  renderCart();
}

function renderCart() {
  const el = document.getElementById('order-items');
  if (cart.length === 0) {
    el.innerHTML = `<div class="empty-order"><div class="empty-order-icon">🛒</div><div class="empty-order-text">Tap items to add them</div></div>`;
    updateTotals(0);
    document.getElementById('submit-btn').disabled = true;
    return;
  }
  el.innerHTML = cart.map(item => `
    <div class="order-line">
      <div class="order-line-emoji">${item.emoji}</div>
      <div class="order-line-info">
        <div class="order-line-name">${item.name}</div>
        <div class="order-line-unit">$${item.price.toFixed(2)} ea</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn minus" onclick="changeQty('${item.id}', -1)">−</button>
        <div class="qty-num">${item.qty}</div>
        <button class="qty-btn plus" onclick="changeQty('${item.id}', 1)">+</button>
      </div>
      <div class="order-line-total">$${(item.price * item.qty).toFixed(2)}</div>
    </div>`).join('');
  const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  updateTotals(subtotal);
  document.getElementById('submit-btn').disabled = false;
}

function updateTotals(subtotal) {
  const tax = subtotal * TAX_RATE;
  const grand = subtotal + tax;
  document.getElementById('subtotal').textContent = '$' + subtotal.toFixed(2);
  document.getElementById('tax').textContent = '$' + tax.toFixed(2);
  document.getElementById('grand-total').textContent = '$' + grand.toFixed(2);
}

// =============================================
// ORDER TYPE & PAYMENT
// =============================================
function setOrderType(type) {
  orderType = type;
  ['dinein','takeaway','delivery'].forEach(t => {
    document.getElementById('btn-' + t).classList.remove('active');
  });
  document.getElementById('btn-' + type.replace('-','')).classList.add('active');
  const tableRow = document.getElementById('table-row');
  tableRow.style.display = (type === 'dine-in') ? 'flex' : 'none';
}

function setPayment(method) {
  paymentMethod = method;
  ['cash','card','mobile'].forEach(m => document.getElementById('pay-' + m).classList.remove('active'));
  document.getElementById('pay-' + method.toLowerCase()).classList.add('active');
}

// =============================================
// SUBMIT ORDER
// =============================================
async function submitOrder() {
  if (cart.length === 0) return;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>SENDING…';

  const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const tax = subtotal * TAX_RATE;
  const grand = subtotal + tax;
  const tableNum = document.getElementById('table-num').value || '';
  const covers = document.getElementById('covers').value || '';
  const note = document.getElementById('order-note').value || '';
  const now = new Date();

  const payload = {
    orderNumber: String(orderCounter).padStart(4, '0'),
    date: now.toLocaleDateString(),
    time: now.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'}),
    orderType,
    table: tableNum,
    covers,
    staff: staffName,
    items: cart.map(i => `${i.qty}x ${i.name}`).join(', '),
    itemsDetail: JSON.stringify(cart.map(i => ({name: i.name, qty: i.qty, unit: i.price, line: +(i.price * i.qty).toFixed(2)}))),
    subtotal: subtotal.toFixed(2),
    tax: tax.toFixed(2),
    total: grand.toFixed(2),
    payment: paymentMethod,
    note
  };

  try {
    // Apps Script can't read POST body in no-cors mode, so we send via GET params
    const params = new URLSearchParams(payload);
    await fetch(scriptUrl + '?' + params.toString(), {
      method: 'GET',
      mode: 'no-cors'
    });
    // Increment order counter
    orderCounter++;
    localStorage.setItem('qb_order_counter', String(orderCounter));
    document.getElementById('order-num').textContent = '#' + String(orderCounter).padStart(4, '0');
    showToast('✅ Order #' + payload.orderNumber + ' sent!');
    clearOrder();
    document.getElementById('table-num').value = '';
    document.getElementById('covers').value = '';
  } catch (err) {
    showToast('⚠️ Could not reach sheet. Check URL.');
    console.error(err);
  }

  btn.disabled = false;
  btn.innerHTML = 'SEND ORDER';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Prevent scroll-bounce on iPad
document.body.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
document.getElementById('menu-panel').addEventListener('touchmove', e => e.stopPropagation(), { passive: true });
document.getElementById('order-items').addEventListener('touchmove', e => e.stopPropagation(), { passive: true });
</script>
